[build]
builder = "RAILPACK"
buildCommand = "go build -o practice-planner-backend ./cmd/api"
watchPatterns = ["cmd/**", "internal/**", "go.mod", "go.sum", "railway.toml"]

[deploy]
startCommand = "./practice-planner-backend"
healthcheckPath = "/healthz"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
