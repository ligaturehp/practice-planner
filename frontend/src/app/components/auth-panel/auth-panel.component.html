@if (planner.state().authPanelOpen) {
  <section class="auth-panel" aria-labelledby="authPanelTitle">
    <div class="panel-section-heading">
      <div>
        <p class="eyebrow">Account</p>
        <h3 id="authPanelTitle">{{ mode === 'login' ? 'Sign In' : 'Create Account' }}</h3>
      </div>
      <button class="text-button" type="button" (click)="planner.closeAuthPanel()">Close</button>
    </div>

    <div class="segmented-control" aria-label="Authentication mode">
      <button type="button" [class.is-active]="mode === 'login'" (click)="mode = 'login'">Sign in</button>
      <button type="button" [class.is-active]="mode === 'register'" (click)="mode = 'register'">Register</button>
    </div>

    <form class="auth-form" (ngSubmit)="submit()">
      <label>
        <span>Email</span>
        <input name="email" type="email" autocomplete="email" [(ngModel)]="email" required />
      </label>
      <label>
        <span>Password</span>
        <input name="password" type="password" autocomplete="current-password" [(ngModel)]="password" required />
      </label>
      <button class="primary-button" type="submit">{{ mode === 'login' ? 'Sign In' : 'Create Account' }}</button>
    </form>

    <p class="block-notes">{{ status }}</p>
  </section>
}
